services:
  seanime:
    build: .
    container_name: seanime
    user: "1000:1000"
    environment:
      SEANIME_SERVER_HOST: 0.0.0.0
      SEANIME_SERVER_PORT: 43211
      TZ: Asia/Taipei
    ports:
      - "43211:43211"
    volumes:
      - ./config:/home/seanime/.config/Seanime
      - /mnt/media/anime:/anime
      - /mnt/media/downloads:/downloads
    restart: unless-stopped
